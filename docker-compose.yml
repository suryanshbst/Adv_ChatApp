services:
  http-backend:
    build:
      context: .
      dockerfile: dockerfile/dockerfile.httpbackend
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=3002
    ports:
      - "3002:3002"
    restart: always

  ws-server:
    build:
      context: .
      dockerfile: dockerfile/dockerfile.wsbackend
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=8080
    ports:
      - "8080:8080"
    restart: always

  web:
    build:
      context: .
      dockerfile: dockerfile/dockerfile.frontend
      args:
        NEXT_PUBLIC_HTTP_BACKEND: ${NEXT_PUBLIC_HTTP_BACKEND}
        NEXT_PUBLIC_WS_BACKEND: ${NEXT_PUBLIC_WS_BACKEND}
    # ADD THESE ENVIRONMENT LINES BELOW:
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_HTTP_BACKEND=${NEXT_PUBLIC_HTTP_BACKEND}
      - NEXT_PUBLIC_WS_BACKEND=${NEXT_PUBLIC_WS_BACKEND}
    ports:
      - "3000:3000"
    depends_on:
      - http-backend
      - ws-server
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - http-backend
      - ws-server
    restart: always
